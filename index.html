<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>G3KZZZ — Writeups</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">🌐 <strong>G3KZZZ</strong> — Writeups</div>
    <div class="controls">
      <button id="themeToggle" aria-label="Toggle theme">🌙</button>
      <input id="search" placeholder="Search writeups, machines or tags... 🔎" />
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <img id="logo" src="assets/logo.png" alt="logo" />
      <h1>G3KZZZ</h1>
      <p class="tagline">Lost things may vanish. Writeups will remain. ✨</p>
      <div class="social">🔗 <a href="https://github.com/g3kzzz" target="_blank">github.com/g3kzzz</a></div>
    </section>

    <section class="filters">
      <h2>Filters</h2>
      <div id="tagContainer" class="tags"></div>
    </section>

    <section>
      <h2>Recent Writeups</h2>
      <div id="cards" class="cards"></div>
    </section>
  </main>

  <footer class="footer">© <span id="year"></span> G3KZZZ — Built for GitHub Pages • No external servers</footer>

  <template id="cardTpl">
    <article class="card">
      <div class="card-header">
        <h3 class="machine"></h3>
        <div class="meta"><time class="date"></time> • <span class="readtime">—</span></div>
      </div>
      <p class="desc"></p>
      <div class="tagList"></div>
      <a class="open" href="#">Open ➜</a>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
