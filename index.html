---
layout: default
title: "Home"
---
<section class="hero">
  <div class="container center pad-xl">
    <img class="avatar" src="{{ '/assets/img/avatar.png' | relative_url }}" alt="Author avatar">
    <h1>HYH</h1>
    <p class="subtitle">Security researcher & CTF enjoyer. I publish clean, replicable writeups.</p>
    <div class="social">
      <a href="https://github.com/" target="_blank" rel="noopener">GitHub</a>
      <a href="https://twitter.com/" target="_blank" rel="noopener">X/Twitter</a>
    </div>
  </div>
</section>

<section id="posts" class="container pad-lg">
  <div class="filters">
    <input id="search" type="search" placeholder="Search writeups...">
    <select id="category">
      <option value="">All categories</option>
    </select>
    <div id="tags" class="tag-cloud"></div>
    <div class="sort">
      <label for="sort">Sort:</label>
      <select id="sort">
        <option value="date-desc">Newest</option>
        <option value="date-asc">Oldest</option>
        <option value="title-asc">Title A–Z</option>
        <option value="title-desc">Title Z–A</option>
      </select>
    </div>
  </div>

  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" hidden>
    <p>No posts match your filters.</p>
  </div>
</section>
