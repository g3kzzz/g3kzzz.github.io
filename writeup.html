
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Writeup — G3KZZZ</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="topbar">
  <div class="brand">← <a href="index.html">Back</a></div>
  <div class="controls"><a href="index.html">🏠 Home</a></div>
</header>
<main class="container">
  <article id="post" class="card" style="min-height:200px"></article>
</main>
<script>
function parseFrontmatter(text){
  const fm = {title:'',date:'',machine:'',tags:[],description:''};
  if(text.startsWith('---')){
    const end = text.indexOf('---',3);
    if(end!==-1){
      const block = text.slice(3,end).trim();
      block.split('\n').forEach(line=>{
        const i = line.indexOf(':');
        if(i>0){
          const key = line.slice(0,i).trim();
          let val = line.slice(i+1).trim();
          if(val.startsWith('[') && val.endsWith(']')){
            val = val.slice(1,-1).split(',').map(s=>s.trim().replace(/^["']|["']$/g,''));
          } else {
            val = val.replace(/^["']|["']$/g,'');
          }
          fm[key]=val;
        }
      });
      fm.content = text.slice(end+3).trim();
      return fm;
    }
  }
  fm.content = text;
  return fm;
}

async function load(){
  const params = new URLSearchParams(location.search);
  const file = params.get('file') || 'writeups/sample1.md';
  try{
    const r = await fetch(file);
    const txt = await r.text();
    const post = parseFrontmatter(txt);
    const el = document.getElementById('post');
    el.innerHTML = `
      <h1>${post.title || post.machine}</h1>
      <div class="meta">${post.machine} • ${new Date(post.date).toLocaleDateString()}</div>
      <p class="desc">${post.description || ''}</p>
      <hr/>
      <div id="content"></div>
    `;
    // very small markdown -> html conversion: headings, code fences, paragraphs, links, lists
    let md = post.content;
    // code fences
    md = md.replace(/```([\s\S]*?)```/g, (m,g)=> '<pre class="code"><code>'+escapeHtml(g)+'</code></pre>');
    // headings
    md = md.replace(/^### (.*$)/gim,'<h3>$1</h3>');
    md = md.replace(/^## (.*$)/gim,'<h2>$1</h2>');
    md = md.replace(/^# (.*$)/gim,'<h1>$1</h1>');
    // bold/italic
    md = md.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>');
    // links
    md = md.replace(/\[(.*?)\]\((.*?)\)/g,'<a href="$2" target="_blank">$1</a>');
    // lists
    md = md.replace(/^\s*[-*] (.*)/gmi,'<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>');
    // paragraphs
    md = md.split(/\n\n+/).map(p=> {
      if(p.match(/^<h|^<ul|^<pre/)) return p;
      return '<p>'+p.replace(/\n/g,' ')+'</p>';
    }).join('\n');
    document.getElementById('content').innerHTML = md;
  }catch(e){
    document.getElementById('post').textContent = 'Failed to load writeup: ' + e;
  }
}

function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

load();
</script>
</body>
</html>
