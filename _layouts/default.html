<!doctype html>
<html lang="en" data-theme="system">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title | escape }} — {{ site.title | escape }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_newlines | escape }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" href="{{ '/assets/img/favicon.svg' | relative_url }}" type="image/svg+xml">
</head>
<body>
  {% include header.html %}
  <main id="content">
    {{ content }}
  </main>
  {% include footer.html %}
  <script defer src="{{ '/assets/js/app.js' | relative_url }}"></script>
</body>
</html>
